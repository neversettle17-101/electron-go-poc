<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <title>Electron + Go PoC</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 32px;
        max-width: 560px;
        margin: 0 auto;
        background: #0d1117;
        color: #e6edf3;
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p.lede { color: #9da7b3; margin: 0 0 24px; font-size: 14px; }
      input, button {
        font-size: 15px;
        padding: 8px 12px;
        border-radius: 4px;
        border: 1px solid #30363d;
        background: #161b22;
        color: #e6edf3;
      }
      button {
        background: #1f6feb;
        border-color: #1f6feb;
        cursor: pointer;
        margin-left: 6px;
      }
      button:hover { background: #388bfd; }
      .out {
        margin-top: 20px;
        padding: 14px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        white-space: pre-wrap;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 13px;
        min-height: 60px;
      }
      .status {
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #30363d;
        color: #9da7b3;
        font-size: 12px;
        font-family: ui-monospace, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <h1>Hello from Electron + Go</h1>
    <p class="lede">
      Click Greet. Flow: <strong>renderer</strong> &rarr; IPC &rarr;
      <strong>main</strong> &rarr; HTTP &rarr; <strong>Go</strong> &rarr; back.
    </p>
    <input id="name" placeholder="Your name" value="World" />
    <button id="go">Greet</button>
    <div id="out" class="out">&mdash;</div>
    <div id="status" class="status">Loading backend status&hellip;</div>
    <script src="./renderer.js"></script>
  </body>
</html>
